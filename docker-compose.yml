services:
  emqx:
    image: emqx/emqx:5.8
    ports:
      - "1883:1883"
      - "18083:18083"
    environment:
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: public
    healthcheck:
      test: ["CMD-SHELL", "emqx ctl status >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: vpp-lab-pass
      DOCKER_INFLUXDB_INIT_ORG: vpp-lab
      DOCKER_INFLUXDB_INIT_BUCKET: vpp
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: vpp-lab-token
    volumes:
      - ./data/influxdb:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vpp
      POSTGRES_PASSWORD: vpp
      POSTGRES_DB: vpp
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpp -d vpp"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: public
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
      - ./data/grafana:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      influxdb:
        condition: service_healthy
      prometheus:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules:/etc/prometheus/rules:ro
      - ./data/prometheus:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9090/-/healthy >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      app:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    env_file:
      - .env
    environment:
      MQTT_BROKER: tcp://emqx:1883
      INFLUX_URL: http://influxdb:8086
      POSTGRES_DSN: postgres://vpp:vpp@postgres:5432/vpp?sslmode=disable
      REDIS_ADDR: redis:6379
      CONTROL_TOKEN: ${CONTROL_TOKEN:-}
    ports:
      - "8080:8080"
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      emqx:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  simulator:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    entrypoint: ["/app/simulator"]
    environment:
      MQTT_BROKER: tcp://emqx:1883
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      SITE_ID: home-lab
    restart: on-failure
    healthcheck:
      test: ["CMD", "pidof", "simulator"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      emqx:
        condition: service_healthy
      app:
        condition: service_healthy

  edge-gateway:
    profiles:
      - edge
    build:
      context: .
      dockerfile: deploy/Dockerfile
    entrypoint: ["/app/edge-gateway"]
    environment:
      SITE_ID: home-lab
      EDGE_LOCAL_BROKER: tcp://emqx:1883
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      EDGE_CACHE_PATH: /data/cache.db
      EDGE_FLUSH_INTERVAL: 5s
      EDGE_CACHE_RETENTION: 24h
      EDGE_CLEANUP_INTERVAL: 1h
      EDGE_HTTP_ADDR: :8081
      EDGE_CAPTURE_KINDS: telemetry,event,status
      EDGE_UPSTREAM_TOPIC_PREFIX: ${EDGE_UPSTREAM_TOPIC_PREFIX:-}
    ports:
      - "8081:8081"
    volumes:
      - ./data/edge-gateway:/data
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      emqx:
        condition: service_healthy
